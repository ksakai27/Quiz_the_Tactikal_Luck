<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>Sound Preview v5</title>
  <style>
    body { background:#09090b; color:#e4e4e7; font-family:'Segoe UI',sans-serif; padding:32px; }
    h2 { color:#dc2626; letter-spacing:0.1em; margin-top:2.5rem; }
    .grid  { display:grid; grid-template-columns:repeat(5,1fr); gap:10px; margin-bottom:1rem; }
    .grid3 { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:1rem; max-width:560px; }
    .grid2 { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; margin-bottom:1rem; max-width:380px; }
    button {
      padding:20px 8px; border:1px solid #3f3f46; background:#18181b;
      color:#e4e4e7; border-radius:6px; cursor:pointer; font-size:0.82rem;
      line-height:1.5; transition:all 0.12s; white-space:pre-line;
    }
    button:hover { background:#27272a; }
    button:active { transform:scale(0.94); }
    .confirmed { border-color:#92400e; background:#1c1007; color:#fcd34d; }
    .confirmed:hover { border-color:#f59e0b; background:#271508; }
    .laser-btn  { border-color:#1e4d2b; }
    .laser-btn:hover  { border-color:#22c55e; background:#052e16; color:#86efac; }
    .note { font-size:0.75rem; color:#52525b; margin:4px 0 14px; }
    .tag  { display:inline-block; font-size:0.65rem; padding:2px 8px;
            border-radius:3px; background:#92400e; color:#fcd34d; margin-bottom:8px; }
  </style>
</head>
<body>
<h1 style="color:#fff;margin:0 0 4px">🔊 Sound Preview v5</h1>
<p style="color:#52525b;font-size:0.85rem">確定済み音の確認 + 正解音（レーザー系）追加候補</p>

<h2>✅ 確定済み一覧（確認用）</h2>
<p class="note">これらはすでに決定 — 念のため試聴</p>
<div class="grid3" id="confirmed-grid"></div>

<h2>🔫 正解音 — レーザー系 新10種</h2>
<p class="note">好みのものを選んでください（複数OK）</p>
<div class="grid" id="laser-grid"></div>

<script>
let ac=null;
function A(){
  if(!ac) ac=new(window.AudioContext||window.webkitAudioContext)();
  if(ac.state==='suspended') ac.resume();
  return ac;
}
function rev(ac,g,wet=0.4,delay=0.09,fb=0.42){
  const d=ac.createDelay(2); d.delayTime.value=delay;
  const f=ac.createGain(); f.gain.value=fb;
  const w=ac.createGain(); w.gain.value=wet;
  g.connect(d); d.connect(f); f.connect(d); d.connect(w); w.connect(ac.destination);
}

// ─── CONFIRMED ────────────────────────────────────────────────────────────────
const confirmed = [
  { label: '🎬 イントロ音\n（重力波）', play(ac){
    const t=ac.currentTime;
    const o=ac.createOscillator(); const g=ac.createGain();
    o.type='sine'; o.frequency.setValueAtTime(80,t); o.frequency.exponentialRampToValueAtTime(800,t+0.3);
    g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(0.5,t+0.15); g.gain.exponentialRampToValueAtTime(0.001,t+0.35);
    o.connect(g); g.connect(ac.destination); rev(ac,g,0.5,0.1,0.5);
    o.start(t); o.stop(t+0.35);
    const o2=ac.createOscillator(); const g2=ac.createGain();
    o2.type='sine'; o2.frequency.setValueAtTime(80,t+0.25); o2.frequency.exponentialRampToValueAtTime(600,t+0.5);
    g2.gain.setValueAtTime(0,t+0.25); g2.gain.linearRampToValueAtTime(0.25,t+0.38); g2.gain.exponentialRampToValueAtTime(0.001,t+0.55);
    o2.connect(g2); g2.connect(ac.destination); rev(ac,g2,0.6,0.12,0.5); o2.start(t+0.25); o2.stop(t+0.55);
    [220,330,440].forEach((f,i)=>{
      const oo=ac.createOscillator(); const gg=ac.createGain();
      oo.type='sine'; oo.frequency.value=f;
      gg.gain.setValueAtTime(0,t+0.3+i*0.04); gg.gain.linearRampToValueAtTime(0.1,t+0.4+i*0.04);
      gg.gain.exponentialRampToValueAtTime(0.001,t+1.2);
      oo.connect(gg); gg.connect(ac.destination); rev(ac,gg,0.7,0.12,0.55); oo.start(t+0.3+i*0.04); oo.stop(t+1.2);
    });
  }},
  { label: '⏱ カウント音\nB2・スイッチON', play(ac){
    const t=ac.currentTime;
    const buf=ac.createBuffer(1,Math.floor(ac.sampleRate*0.008),ac.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*(1-i/d.length);
    const src=ac.createBufferSource(); src.buffer=buf;
    const f=ac.createBiquadFilter(); f.type='highpass'; f.frequency.value=3000;
    const g=ac.createGain(); g.gain.value=1.0;
    src.connect(f); f.connect(g); g.connect(ac.destination); src.start(t);
    const o=ac.createOscillator(); const og=ac.createGain();
    o.type='sine'; o.frequency.value=1047;
    og.gain.setValueAtTime(0.35,t+0.01); og.gain.exponentialRampToValueAtTime(0.001,t+0.1);
    o.connect(og); og.connect(ac.destination); o.start(t+0.01); o.stop(t+0.1);
  }},
  { label: '🔴 回答するボタン\n（シールド展開）', play(ac){
    const t=ac.currentTime;
    for(let i=0;i<8;i++){
      const o=ac.createOscillator(); const g=ac.createGain();
      o.type='sine'; o.frequency.setValueAtTime(200+i*80,t+i*0.03); o.frequency.linearRampToValueAtTime(300+i*90,t+i*0.03+0.3);
      g.gain.setValueAtTime(0,t+i*0.03); g.gain.linearRampToValueAtTime(0.07,t+i*0.03+0.1); g.gain.exponentialRampToValueAtTime(0.001,t+i*0.03+0.6);
      o.connect(g); g.connect(ac.destination); rev(ac,g,0.5,0.1,0.4); o.start(t+i*0.03); o.stop(t+i*0.03+0.6);
    }
    const hum=ac.createOscillator(); const hg=ac.createGain();
    hum.type='sine'; hum.frequency.value=55;
    hg.gain.setValueAtTime(0,t+0.2); hg.gain.linearRampToValueAtTime(0.3,t+0.5); hg.gain.exponentialRampToValueAtTime(0.001,t+1.0);
    hum.connect(hg); hg.connect(ac.destination); hum.start(t+0.2); hum.stop(t+1.0);
  }},
  { label: '❌ 不正解音\n（うにゅ〜）', play(ac){
    const t=ac.currentTime;
    const o=ac.createOscillator(); const g=ac.createGain();
    o.type='triangle'; o.frequency.setValueAtTime(800,t); o.frequency.exponentialRampToValueAtTime(60,t+1.2);
    const lfo=ac.createOscillator(); const lg=ac.createGain();
    lfo.frequency.setValueAtTime(12,t); lfo.frequency.exponentialRampToValueAtTime(3,t+1.2);
    lg.gain.setValueAtTime(100,t); lg.gain.exponentialRampToValueAtTime(10,t+1.2);
    lfo.connect(lg); lg.connect(o.frequency);
    g.gain.setValueAtTime(0.4,t); g.gain.exponentialRampToValueAtTime(0.001,t+1.2);
    o.connect(g); g.connect(ac.destination); lfo.start(t); lfo.stop(t+1.2); o.start(t); o.stop(t+1.2);
  }},
];

// ─── LASER CORRECT SOUNDS ─────────────────────────────────────────────────────
const lasers = [
  { label: 'L1. クラシック\nSFレーザー', play(ac){
    // The definitive "pew" — fast sawtooth sweep down with glow
    const t=ac.currentTime;
    const o=ac.createOscillator(); const g=ac.createGain();
    o.type='sawtooth'; o.frequency.setValueAtTime(2200,t); o.frequency.exponentialRampToValueAtTime(180,t+0.22);
    g.gain.setValueAtTime(0.5,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.22);
    o.connect(g); g.connect(ac.destination); rev(ac,g,0.3,0.06,0.35); o.start(t); o.stop(t+0.22);
    // Glow: sine layer
    const o2=ac.createOscillator(); const g2=ac.createGain();
    o2.type='sine'; o2.frequency.setValueAtTime(2200,t); o2.frequency.exponentialRampToValueAtTime(180,t+0.22);
    g2.gain.setValueAtTime(0.2,t); g2.gain.exponentialRampToValueAtTime(0.001,t+0.22);
    o2.connect(g2); g2.connect(ac.destination); o2.start(t); o2.stop(t+0.22);
  }},
  { label: 'L2. チャージ\nレーザー砲', play(ac){
    // Build-up whine then sharp beam
    const t=ac.currentTime;
    const charge=ac.createOscillator(); const cg=ac.createGain();
    charge.type='sine'; charge.frequency.setValueAtTime(300,t); charge.frequency.exponentialRampToValueAtTime(3000,t+0.3);
    cg.gain.setValueAtTime(0,t); cg.gain.linearRampToValueAtTime(0.3,t+0.25); cg.gain.exponentialRampToValueAtTime(0.001,t+0.31);
    charge.connect(cg); cg.connect(ac.destination); charge.start(t); charge.stop(t+0.31);
    // Fire: sharp descending beam
    const beam=ac.createOscillator(); const bg=ac.createGain();
    beam.type='sawtooth'; beam.frequency.setValueAtTime(3000,t+0.3); beam.frequency.exponentialRampToValueAtTime(200,t+0.55);
    bg.gain.setValueAtTime(0.6,t+0.3); bg.gain.exponentialRampToValueAtTime(0.001,t+0.55);
    beam.connect(bg); bg.connect(ac.destination); rev(ac,bg,0.4,0.07,0.38); beam.start(t+0.3); beam.stop(t+0.55);
  }},
  { label: 'L3. パルスレーザー\n（3連射）', play(ac){
    const t=ac.currentTime;
    [0,0.11,0.22].forEach((offset,i)=>{
      const o=ac.createOscillator(); const g=ac.createGain();
      o.type='sawtooth'; o.frequency.setValueAtTime(2800-i*100,t+offset); o.frequency.exponentialRampToValueAtTime(300,t+offset+0.09);
      g.gain.setValueAtTime(0.45,t+offset); g.gain.exponentialRampToValueAtTime(0.001,t+offset+0.09);
      o.connect(g); g.connect(ac.destination); rev(ac,g,0.25,0.05,0.3); o.start(t+offset); o.stop(t+offset+0.09);
    });
  }},
  { label: 'L4. フェイザー\n（波打つ）', play(ac){
    // Phaser: sine with LFO-modulated frequency = wavy laser
    const t=ac.currentTime;
    const car=ac.createOscillator(); const lfo=ac.createOscillator(); const lg=ac.createGain(); const g=ac.createGain();
    car.type='sawtooth'; car.frequency.setValueAtTime(1400,t); car.frequency.exponentialRampToValueAtTime(200,t+0.5);
    lfo.type='sine'; lfo.frequency.setValueAtTime(30,t); lfo.frequency.exponentialRampToValueAtTime(8,t+0.5);
    lg.gain.setValueAtTime(300,t); lg.gain.exponentialRampToValueAtTime(20,t+0.5);
    lfo.connect(lg); lg.connect(car.frequency);
    g.gain.setValueAtTime(0.45,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.5);
    car.connect(g); g.connect(ac.destination); rev(ac,g,0.35,0.07,0.38);
    lfo.start(t); lfo.stop(t+0.5); car.start(t); car.stop(t+0.5);
  }},
  { label: 'L5. ビームライフル\n（鋭い単発）', play(ac){
    // Sharp, tight, high-pitched single beam
    const t=ac.currentTime;
    const o=ac.createOscillator(); const g=ac.createGain();
    o.type='sawtooth'; o.frequency.setValueAtTime(4000,t); o.frequency.exponentialRampToValueAtTime(400,t+0.14);
    g.gain.setValueAtTime(0.55,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.14);
    o.connect(g); g.connect(ac.destination); rev(ac,g,0.3,0.06,0.32); o.start(t); o.stop(t+0.14);
    // Metallic ring residue
    const ring=ac.createOscillator(); const rg=ac.createGain();
    ring.type='sine'; ring.frequency.value=1100;
    rg.gain.setValueAtTime(0.15,t+0.1); rg.gain.exponentialRampToValueAtTime(0.001,t+0.6);
    ring.connect(rg); rg.connect(ac.destination); rev(ac,rg,0.5,0.1,0.45); ring.start(t+0.1); ring.stop(t+0.6);
  }},
  { label: 'L6. プラズマ\nキャノン', play(ac){
    // FM synthesis for rich complex laser texture
    const t=ac.currentTime;
    const mod=ac.createOscillator(); const mg=ac.createGain();
    const car=ac.createOscillator(); const g=ac.createGain();
    car.type='sine'; car.frequency.setValueAtTime(800,t); car.frequency.exponentialRampToValueAtTime(80,t+0.45);
    mod.type='sine'; mod.frequency.setValueAtTime(800*4,t); mod.frequency.exponentialRampToValueAtTime(80*4,t+0.45);
    mg.gain.setValueAtTime(2400,t); mg.gain.exponentialRampToValueAtTime(50,t+0.45);
    mod.connect(mg); mg.connect(car.frequency);
    g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(0.55,t+0.015); g.gain.exponentialRampToValueAtTime(0.001,t+0.45);
    car.connect(g); g.connect(ac.destination); rev(ac,g,0.45,0.08,0.42);
    mod.start(t); mod.stop(t+0.45); car.start(t); car.stop(t+0.45);
    // Sub impact
    const sub=ac.createOscillator(); const sg=ac.createGain();
    sub.type='sine'; sub.frequency.setValueAtTime(100,t); sub.frequency.exponentialRampToValueAtTime(30,t+0.15);
    sg.gain.setValueAtTime(0,t); sg.gain.linearRampToValueAtTime(0.6,t+0.01); sg.gain.exponentialRampToValueAtTime(0.001,t+0.2);
    sub.connect(sg); sg.connect(ac.destination); sub.start(t); sub.stop(t+0.2);
  }},
  { label: 'L7. スナイパー\n（静寂→炸裂）', play(ac){
    // Silence then crack — like a bullet passing
    const t=ac.currentTime;
    // Tiny pre-squeak
    const pre=ac.createOscillator(); const pg=ac.createGain();
    pre.type='sine'; pre.frequency.setValueAtTime(6000,t); pre.frequency.exponentialRampToValueAtTime(2000,t+0.02);
    pg.gain.setValueAtTime(0.15,t); pg.gain.exponentialRampToValueAtTime(0.001,t+0.02);
    pre.connect(pg); pg.connect(ac.destination); pre.start(t); pre.stop(t+0.02);
    // Crack: sharp noise burst
    const buf=ac.createBuffer(1,Math.floor(ac.sampleRate*0.04),ac.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*(1-i/d.length);
    const src=ac.createBufferSource(); src.buffer=buf;
    const f=ac.createBiquadFilter(); f.type='bandpass'; f.frequency.value=4000; f.Q.value=0.7;
    const cg=ac.createGain(); cg.gain.value=2.0;
    src.connect(f); f.connect(cg); cg.connect(ac.destination); src.start(t+0.02);
    // Long decay sweep
    const o=ac.createOscillator(); const g=ac.createGain();
    o.type='sawtooth'; o.frequency.setValueAtTime(2000,t+0.025); o.frequency.exponentialRampToValueAtTime(80,t+0.5);
    g.gain.setValueAtTime(0.35,t+0.025); g.gain.exponentialRampToValueAtTime(0.001,t+0.5);
    o.connect(g); g.connect(ac.destination); rev(ac,g,0.5,0.1,0.45); o.start(t+0.025); o.stop(t+0.5);
  }},
  { label: 'L8. イオンビーム\n（長め余韻）', play(ac){
    // Sustained beam with shimmer
    const t=ac.currentTime;
    const o=ac.createOscillator(); const g=ac.createGain();
    o.type='sawtooth'; o.frequency.setValueAtTime(1800,t); o.frequency.exponentialRampToValueAtTime(220,t+0.5);
    g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(0.4,t+0.02); g.gain.setValueAtTime(0.4,t+0.25); g.gain.exponentialRampToValueAtTime(0.001,t+0.5);
    o.connect(g); g.connect(ac.destination); rev(ac,g,0.4,0.08,0.4); o.start(t); o.stop(t+0.5);
    // High shimmer that lingers
    [2200,3300,4400].forEach((f,i)=>{
      const oo=ac.createOscillator(); const gg=ac.createGain();
      oo.type='sine'; oo.frequency.value=f;
      gg.gain.setValueAtTime(0.06,t+i*0.03); gg.gain.exponentialRampToValueAtTime(0.001,t+0.8);
      oo.connect(gg); gg.connect(ac.destination); rev(ac,gg,0.7,0.12,0.5); oo.start(t+i*0.03); oo.stop(t+0.8);
    });
  }},
  { label: 'L9. ガトリング\nレーザー（6連）', play(ac){
    const t=ac.currentTime;
    for(let i=0;i<6;i++){
      const o=ac.createOscillator(); const g=ac.createGain();
      o.type='square'; o.frequency.setValueAtTime(1800+i*50,t+i*0.055); o.frequency.exponentialRampToValueAtTime(300,t+i*0.055+0.05);
      g.gain.setValueAtTime(0.3,t+i*0.055); g.gain.exponentialRampToValueAtTime(0.001,t+i*0.055+0.05);
      o.connect(g); g.connect(ac.destination); o.start(t+i*0.055); o.stop(t+i*0.055+0.05);
    }
    // Bass rumble underneath
    const b=ac.createOscillator(); const bg=ac.createGain();
    b.type='sine'; b.frequency.value=60;
    bg.gain.setValueAtTime(0.25,t); bg.gain.exponentialRampToValueAtTime(0.001,t+0.45);
    b.connect(bg); bg.connect(ac.destination); b.start(t); b.stop(t+0.45);
  }},
  { label: 'L10. エネルギー砲\n（低音＋ビーム）', play(ac){
    // Big low boom + beam: feels weighty
    const t=ac.currentTime;
    // Low cannon boom
    const boom=ac.createOscillator(); const bg=ac.createGain();
    boom.type='sine'; boom.frequency.setValueAtTime(80,t); boom.frequency.exponentialRampToValueAtTime(25,t+0.3);
    bg.gain.setValueAtTime(0,t); bg.gain.linearRampToValueAtTime(0.9,t+0.01); bg.gain.exponentialRampToValueAtTime(0.001,t+0.35);
    boom.connect(bg); bg.connect(ac.destination); boom.start(t); boom.stop(t+0.35);
    // Simultaneous beam
    const beam=ac.createOscillator(); const beamg=ac.createGain();
    beam.type='sawtooth'; beam.frequency.setValueAtTime(2500,t); beam.frequency.exponentialRampToValueAtTime(150,t+0.4);
    beamg.gain.setValueAtTime(0.4,t); beamg.gain.exponentialRampToValueAtTime(0.001,t+0.4);
    beam.connect(beamg); beamg.connect(ac.destination); rev(ac,beamg,0.4,0.08,0.4); beam.start(t); beam.stop(t+0.4);
    // Noise transient at start
    const buf=ac.createBuffer(1,Math.floor(ac.sampleRate*0.03),ac.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*(1-i/d.length);
    const src=ac.createBufferSource(); src.buffer=buf;
    const f=ac.createBiquadFilter(); f.type='highpass'; f.frequency.value=2000;
    const ng=ac.createGain(); ng.gain.value=1.5;
    src.connect(f); f.connect(ng); ng.connect(ac.destination); src.start(t);
  }},
];

function buildGrid(sounds, id, cls, gridCls){
  const el=document.getElementById(id); el.className=gridCls;
  sounds.forEach(s=>{
    const b=document.createElement('button');
    b.className=cls; b.textContent=s.label;
    b.onclick=()=>s.play(A());
    el.appendChild(b);
  });
}
buildGrid(confirmed, 'confirmed-grid', 'confirmed', 'grid2');
buildGrid(lasers,    'laser-grid',     'laser-btn',  'grid');
</script>
</body>
</html>
